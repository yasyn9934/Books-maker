  const titleLbl  = document.getElementById('peTitleLabel');
  titleLbl.textContent = mode==='doc' ? 'وثيقة / إنجاز جديد' : 'منشور جديد';
  if (editPost) { titleLbl.textContent = 'تعديل ' + (mode==='doc'?'الوثيقة':'المنشور'); }

  textarea.value = editPost ? (editPost.text || '') : '';
  onPeInput();
  renderPeAttachments();

  overlay.style.display = 'flex';
  overlay.classList.remove('night');
  textarea.focus();
}

function closePostEditor() {
  document.getElementById('peOverlay').style.display = 'none';
  _peAttachments = [];
  _peEditId = null;
}

function togglePeNight() {
  _peNight = !_peNight;
  const overlay = document.getElementById('peOverlay');
  overlay.classList.toggle('night', _peNight);
  document.getElementById('peNightBtn').textContent = _peNight ? '☀️' : '🌙';
}

function togglePeBar() {
  _peBarVisible = !_peBarVisible;
  const bar   = document.getElementById('peAttachBar');
  const float = document.getElementById('peFloatBtn');
  bar.classList.toggle('hidden', !_peBarVisible);
  float.style.display = _peBarVisible ? 'none' : 'flex';
}

// سحب الزر العائم داخل pe-inner
function startDragFloat(e) {
  e.preventDefault();
  const btn   = document.getElementById('peFloatBtn');
  const inner = document.getElementById('peInner') || document.getElementById('peOverlay');
  const isTch = e.type === 'touchstart';
  const startX = isTch ? e.touches[0].clientX : e.clientX;
  const startY = isTch ? e.touches[0].clientY : e.clientY;
  const origL  = btn.offsetLeft;
  const origT  = btn.offsetTop;

  function onMove(ev) {
    const cx = isTch ? ev.touches[0].clientX : ev.clientX;
    const cy = isTch ? ev.touches[0].clientY : ev.clientY;
    const dx = cx - startX, dy = cy - startY;
    const rect = inner.getBoundingClientRect();
    const btnW = btn.offsetWidth, btnH = btn.offsetHeight;
    const newL = Math.min(Math.max(0, origL + dx), rect.width  - btnW);
    const newT = Math.min(Math.max(0, origT + dy), rect.height - btnH - 60); // 60 = ارتفاع footer
    btn.style.left   = newL + 'px';
    btn.style.top    = newT + 'px';
    btn.style.bottom = 'auto';
    btn.style.right  = 'auto';
  }

  function onEnd() {
    window.removeEventListener(isTch?'touchmove':'mousemove', onMove);
    window.removeEventListener(isTch?'touchend':'mouseup', onEnd);
  }

  window.addEventListener(isTch?'touchmove':'mousemove', onMove, { passive:false });
  window.addEventListener(isTch?'touchend':'mouseup', onEnd);
}

function onPeInput() {
  const val   = document.getElementById('peTextarea').value;
  const len   = val.length;
  const limit = _peMaxChars;
  const el    = document.getElementById('peCharCount');
  el.textContent = len + ' / ' + limit;
  el.className   = 'pe-char-count' + (len > limit ? ' over' : len > limit * .85 ? ' warn' : '');
  document.getElementById('pePublishBtn').disabled = len > limit;
}

function triggerAttach(type) {
  const counts = {};
  _peAttachments.forEach(a => counts[a.type] = (counts[a.type]||0)+1);
  const limit = PE_LIMITS[type] || 6;
  if ((counts[type]||0) >= limit) {
    showToast(`⚠️ الحد الأقصى ${limit} ملفات من نوع ${type}`); return;
  }
  _peAcceptType = type === 'image' ? 'image/*'
    : type === 'audio'  ? 'audio/*'
    : type === 'video'  ? 'video/*'
    : '.pdf,.html,.htm,.docx,.txt';
  const inp = document.getElementById('peFileInput');
  inp.accept = _peAcceptType;
  inp.dataset.filetype = type;
  inp.click();
}

function handlePeFile(e) {
  const file = e.target.files[0];
  if (!file) return;
  const type = e.target.dataset.filetype || 'pdf';
  if (file.size > 10 * 1024 * 1024) { showToast('⚠️ الحجم الأقصى 10 ميغابايت'); return; }
  const reader = new FileReader();
  reader.onload = ev => {
    _peAttachments.push({ type, data: ev.target.result, name: file.name, size: file.size });
    renderPeAttachments();
    updatePeAttachBtns();
  };
  reader.readAsDataURL(file);
  e.target.value = '';
}

function renderPeAttachments() {
  const wrap = document.getElementById('peAttachments');
  wrap.innerHTML = _peAttachments.map((a, i) => {
    const icon = { image:'🖼️', audio:'🎵', video:'🎥', pdf:'📄' }[a.type] || '📎';
    const preview = a.type === 'image'
      ? `<img class="pe-att-thumb" src="${a.data}" alt="">`
      : `<span>${icon}</span>`;
    return `<div class="pe-att-chip">
      ${preview}
      <span style="max-width:80px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:9.5pt">${a.name}</span>
      <button class="pe-att-remove" onclick="removePeAtt(${i})">✕</button>
    </div>`;
  }).join('');
}

function removePeAtt(idx) {
  _peAttachments.splice(idx, 1);
  renderPeAttachments();
  updatePeAttachBtns();
}

function updatePeAttachBtns() {
  const counts = {};
  _peAttachments.forEach(a => counts[a.type] = (counts[a.type]||0)+1);
  ['image','audio','video','pdf'].forEach(t => {
    const btn = document.getElementById('pe'+t[0].toUpperCase()+t.slice(1)+'Btn');
    if (btn) btn.disabled = (counts[t]||0) >= (PE_LIMITS[t]||6);
  });
}

async function publishPost() {
  const text = document.getElementById('peTextarea').value.trim();
  if (!text && !_peAttachments.length) { showToast('⚠️ المنشور فارغ'); return; }
  if (text.length > _peMaxChars) { showToast('⚠️ تجاوزت حد الحروف'); return; }

  const btn = document.getElementById('pePublishBtn');
  btn.disabled = true; btn.textContent = 'جاري الرفع...';

  // ── رفع كل الملفات إلى السحابة أولاً، واستبدال base64 بالرابط ──
  // base64 لا يُخزَّن أبداً في localStorage لتجنب QuotaExceededError
  const uploadedAtts = [];
  for (const att of _peAttachments) {
    if (att.type === 'youtube') {
      uploadedAtts.push(att);  // يوتيوب لا يحتاج رفع
      continue;
    }
    if (att.src && !att.data) {
      uploadedAtts.push(att);  // مرفوع مسبقاً من uploadLargeFile
      continue;
    }
    if (att.data) {
      // ارفع إلى Drive واحصل على رابط
      if (navigator.onLine && currentUser && currentUser.role === 'member') {
        try {
          btn.textContent = 'جاري رفع: ' + att.name.slice(0, 20) + '...';
          const res  = await fetch(AUTH_CONFIG.SCRIPT_URL, { method:'POST',
            body: JSON.stringify({
              action:   'upload_file',
              userId:   currentUser.id,
              fileName: att.name,
              mimeType: att.mimeType || '',
              data:     att.data
            })
          });
          const result = await res.json();
          if (result.success) {
            // احفظ الرابط فقط — لا base64
            uploadedAtts.push({ type: att.type, src: result.fileUrl, name: att.name, isCloud: true });
          } else {
            showToast('⚠️ فشل رفع: ' + att.name); return;
          }
        } catch(_e) {
          showToast('⚠️ خطأ في رفع: ' + att.name); return;
        }
      } else {
        // أوفلاين: احفظ مؤشراً مؤقتاً فقط (بلا base64)
        uploadedAtts.push({ type: att.type, name: att.name, pending: true });
        localStorage.setItem('royal_pending_posts_sync', 'true');
      }
    }
  }

  btn.textContent = 'جاري النشر...';

  const postId = _peEditId || ('p_' + Date.now());
  const post = {
    id:           postId,
    type:         _peMode,
    text,
    attachments:  uploadedAtts,   // روابط فقط — لا base64
    visibility:   { mode: 'all', accounts: [] },
    reactions:    { heart:[], like:[], laugh:[] },
    commentsCount: 0,
    hidden:       false,
    createdAt:    _peEditId ? undefined : Date.now(),
    updatedAt:    Date.now()
  };

  // حفظ محلي (خالٍ من base64 — آمن على localStorage)
  const key  = _peMode === 'doc' ? 'royal_docs' : 'royal_posts';
  let feed   = JSON.parse(localStorage.getItem(key) || '[]');
  if (_peEditId) {
    const idx = feed.findIndex(p => p.id === _peEditId);
    if (idx > -1) feed[idx] = { ...feed[idx], ...post }; else feed.unshift(post);
  } else {
    feed.unshift(post);
  }
  try {
    localStorage.setItem(key, JSON.stringify(feed));
  } catch(quotaErr) {
    // إذا امتلأت المساحة حتى بعد حذف base64 — أبقِ آخر 20 منشور فقط
    feed = feed.slice(0, 20);
    try { localStorage.setItem(key, JSON.stringify(feed)); } catch(_) {}
    showToast('⚠️ تم حذف المنشورات القديمة لتوفير مساحة');
  }

  // رفع بيانات المنشور (metadata) للسحابة
  if (navigator.onLine && currentUser && currentUser.role === 'member') {
    try {
      await fetch(AUTH_CONFIG.SCRIPT_URL, { method:'POST', body: JSON.stringify({
        action:   'save_post',
        userId:   currentUser.id,
        userName: currentUser.username,
        userPhoto: currentUser.profilePhoto || '',
        post
      })});
    } catch(_) {
      localStorage.setItem('royal_pending_posts_sync', 'true');
    }
  } else {
    localStorage.setItem('royal_pending_posts_sync', 'true');
  }

  closePostEditor();
  loadFeed(_peMode);
  showToast(_peEditId ? '✅ تم التحديث' : '✅ تم النشر');
  btn.disabled = false; btn.textContent = 'نشر';
}

// ══════════════════════════════════════════════
// POSTS / DOCS FEED
// ══════════════════════════════════════════════
function loadFeed(type) {
  const key    = type === 'doc' ? 'royal_docs' : 'royal_posts';
  const feedId = type === 'doc' ? 'docsFeed' : 'postsFeed';
  const feed   = JSON.parse(localStorage.getItem(key) || '[]');
  const el     = document.getElementById(feedId);
  if (!el) return;
  if (!feed.length) {
    el.innerHTML = `<div class="empty-cat" style="grid-column:unset;margin-top:10px">
      📭 لا توجد ${type==='doc'?'وثائق':'منشورات'} بعد</div>`;
    return;
  }
  el.innerHTML = feed.map(p => buildPostCard(p, true)).join('');
}

function buildPostCard(post, isOwner) {
  const u       = isOwner ? currentUser : _visitorProfile;
  const photo   = u && u.profilePhoto ? `<img src="${u.profilePhoto}" alt="">` : '👤';
  const name    = u ? (u.username || '—') : '—';
  const ts      = post.createdAt ? timeAgo(post.createdAt) : '';

  // تجميع الوسائط حسب النوع
  const atts   = post.attachments || [];
  const images = atts.filter(a => a.type==='image');
  const videos = atts.filter(a => a.type==='video');
  const audios = atts.filter(a => a.type==='audio');
  const files  = atts.filter(a => !['image','video','audio','youtube'].includes(a.type));
  const ytbs   = atts.filter(a => a.type==='youtube');
  const pid    = post.id;

  // ── الصور: grid ذكي ──
  const imgsHtml = images.length ? buildImgGrid(images, pid) : '';

  // ── الفيديوهات: iframe Drive أو video tag ──
  const vidsHtml = videos.length ? `<div class="post-vid-slider" id="slider_${pid}_video">
    ${videos.map((a,i)=>{
      const src = a.src||a.data||'';
      const isDrive = src.includes('drive.google.com');
      if (isDrive) return `<iframe class="drive-media-frame video-frame${i>0?' hidden-slide':''}"
        src="${src}" allowfullscreen loading="lazy"></iframe>`;
      return `<video class="${i===0?'active':''}" controls ${i>0?'style="display:none"':''}>
        <source src="${src}"></video>`;
    }).join('')}
    ${videos.length>1?`<div class="slider-arrows">
      <button class="slider-arr" onclick="sliderNav('${pid}','vid',1)">&#8249;</button>
      <button class="slider-arr" onclick="sliderNav('${pid}','vid',-1)">&#8250;</button>
    </div>`:''}
  </div>` : '';

  // ── الصوتيات: iframe Drive أو audio tag ──
  const audsHtml = audios.length ? `<div class="post-audios">
    ${audios.map(a=>{
      const src = a.src||a.data||'';
      const isDrive = src.includes('drive.google.com');
      if (isDrive) return `<iframe class="drive-media-frame audio-frame"
        src="${src}" loading="lazy"></iframe>`;
      return `<audio class="post-media-audio" controls><source src="${src}"></audio>`;
    }).join('')}
  </div>` : '';

  // ── الملفات: grid مثل الصور ──
  const filesHtml = files.length ? buildFileGrid(files, pid) : '';

  // ── يوتيوب ──
  const ytHtml = ytbs.map(a=>
    `<div class="pe-yt-preview"><iframe src="https://www.youtube.com/embed/${a.ytId}"
      allowfullscreen loading="lazy"></iframe></div>`
  ).join('');

  const mediaHtml = imgsHtml + vidsHtml + audsHtml + filesHtml + ytHtml;

  // الردود والتفاعلات
  const hearts = (post.reactions && post.reactions.heart) ? post.reactions.heart.length : 0;
  const likes  = (post.reactions && post.reactions.like)  ? post.reactions.like.length  : 0;
  const visIcon = post.visibility
    ? ({ all:'🌍', specific:'👥', hidden:'🔒' }[post.visibility.mode] || '🌍') : '🌍';

  const ownerActions = isOwner ? `
    <button class="post-action-btn" onclick="editPost('${post.id}','${post.type||'post'}')">✏️ تعديل</button>
    <button class="post-action-btn" onclick="openHideModal('${post.id}')">👁️ رؤية</button>
    <button class="post-action-btn" onclick="deletePost('${post.id}','${post.type||'post'}')">🗑️</button>` : `
    <button class="post-action-btn" onclick="copyPostText('${post.id}')">📋 نسخ</button>`;

  return `<div class="post-card" id="pc_${post.id}" data-post-id="${post.id}">
    <div class="post-card-head">
      <div class="post-author-avatar">${photo}</div>
      <div class="post-author-info">
        <div class="post-author-name">${name}</div>
        <div class="post-time">${ts} <span class="post-visibility-badge">${visIcon}</span>
          ${post.hidden ? '<span class="post-hidden-badge">مخفي</span>' : ''}
        </div>
      </div>
      <button class="dots-btn" onclick="openPostMenu('${post.id}','${post.type||'post'}',${isOwner},event)"
        style="width:32px;height:32px;font-size:13pt;flex-shrink:0">⋮</button>
    </div>
    <div class="post-body">
      ${post.text ? `<div class="post-text">${escHtml(post.text)}</div>` : ''}
      ${mediaHtml ? `<div class="post-media">${mediaHtml}</div>` : ''}
    </div>
    <div class="post-reaction-row">
      <button class="reaction-btn" onclick="reactPost('${post.id}','heart')">❤️ ${hearts}</button>
      <button class="reaction-btn" onclick="reactPost('${post.id}','like')">👍 ${likes}</button>
    </div>
    <div class="post-actions">
      <button class="post-action-btn" onclick="openPostComments('${post.id}')">💬 تعليق</button>
      <button class="post-action-btn" onclick="sharePostLink('${post.id}')">🔗 مشاركة</button>
      ${ownerActions}
    </div>
  </div>`;
}

function escHtml(t) {
  return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/\n/g,'<br>');
}

function openPostMenu(postId, type, isOwner, e) {
  e.stopPropagation();
  const items = isOwner ? [
    { icon:'✏️', label:'تعديل',              fn:`editPost('${postId}','${type}')` },
    { icon:'👁️', label:'إعدادات الرؤية',    fn:`openHideModal('${postId}')` },
    { icon:'🔗', label:'مشاركة برابط',       fn:`sharePostLink('${postId}')` },
    { icon:'📋', label:'نسخ النص',           fn:`copyPostText('${postId}')` },
    { icon:'🗑️', label:'حذف',               fn:`deletePost('${postId}','${type}')`, danger:true },
  ] : [
    { icon:'📋', label:'نسخ النص',     fn:`copyPostText('${postId}')` },
    { icon:'🔗', label:'نسخ الرابط',   fn:`sharePostLink('${postId}')` },
  ];
  showMiniMenu(items, e);
}

function editPost(postId, type) {
  const key  = type === 'doc' ? 'royal_docs' : 'royal_posts';
  const feed = JSON.parse(localStorage.getItem(key) || '[]');
  const post = feed.find(p => p.id === postId);
  if (post) openPostEditor(type, post);
}

async function deletePost(postId, type) {
  showConfirm('هل تريد حذف هذا المنشور نهائياً؟', '🗑️', async () => {
    const key  = type === 'doc' ? 'royal_docs' : 'royal_posts';
    let feed   = JSON.parse(localStorage.getItem(key) || '[]');
    feed       = feed.filter(p => p.id !== postId);
    localStorage.setItem(key, JSON.stringify(feed));
    if (navigator.onLine && currentUser && currentUser.role === 'member') {
      await fetch(AUTH_CONFIG.SCRIPT_URL, { method:'POST', body: JSON.stringify({
        action:'delete_post', userId:currentUser.id, postId
      })}).catch(()=>{});
    }
    loadFeed(type);
    showToast('✅ تم الحذف');
  });
}

function reactPost(postId, reaction) {
  // تفاعل محلي فقط في هذه المرحلة
  ['royal_posts','royal_docs'].forEach(key => {
    const feed = JSON.parse(localStorage.getItem(key) || '[]');
    const post = feed.find(p => p.id === postId);
    if (!post) return;
    if (!post.reactions) post.reactions = { heart:[], like:[], laugh:[] };
    const uid  = currentUser && currentUser.id || 'guest';
    const arr  = post.reactions[reaction] || [];
    const idx  = arr.indexOf(uid);
    if (idx > -1) arr.splice(idx, 1); else arr.push(uid);
    post.reactions[reaction] = arr;
    localStorage.setItem(key, JSON.stringify(feed));
    loadFeed(post.type || 'post');
  });
}

function copyPostText(postId) {
  [...JSON.parse(localStorage.getItem('royal_posts')||'[]'),
   ...JSON.parse(localStorage.getItem('royal_docs') ||'[]')].forEach(p => {
    if (p.id === postId && p.text) {
      navigator.clipboard.writeText(p.text).then(() => showToast('✅ تم نسخ النص'));
    }
  });
}

function sharePostLink(postId) {
  const url = location.href.split('?')[0] + '?uid=' + (currentUser&&currentUser.id||_targetUid) + '&post=' + postId;
  navigator.clipboard.writeText(url).then(() => showToast('✅ تم نسخ رابط المنشور'));
}

function openPostComments(postId) {
  showToast('💬 نظام التعليقات على المنشورات — قريباً');
}

// MEDIA HELPERS: slider + gallery + youtube

// حدود الحجم حسب الدور
function getFileSizeLimit() {
  const tier = currentUser && currentUser.tier || 'basic';
  return { basic:10, premium:50, elite:500, admin:Infinity }[tier] * 1024 * 1024;
}

function buildSlider(items, type, postId) {
  if (!items.length) return '';
  const tag = type === 'video' ? 'video' : 'audio';
  const vids = items.map((a,i) =>
    `<${tag} class="${i===0?'active':''}" controls ${i===0?'':'style="display:none"'}>
      <source src="${a.src||a.data||''}"></${tag}>`
  ).join('');
  const _stype  = type === 'video' ? 'vid' : 'aud';
  const arrows = items.length > 1
    ? `<div class="slider-arrows">
        <button class="slider-arr" onclick="sliderNav('${postId}','${_stype}', 1)">&#8249;</button>
        <button class="slider-arr" onclick="sliderNav('${postId}','${_stype}', -1)">&#8250;</button>
       </div>` : '';
  return `<div class="post-vid-slider" id="slider_${postId}_${type}">${vids}${arrows}</div>`;
}

function sliderNav(postId, type, dir) {
  const wrap  = document.getElementById('slider_' + postId + '_' + type);
  if (!wrap) return;
  const items = wrap.querySelectorAll(type==='vid'?'video':'audio');
  let cur = [...items].findIndex(v => v.classList.contains('active'));
  items[cur].classList.remove('active');
  items[cur].style.display = 'none';
  items[cur].pause();
  cur = (cur + dir + items.length) % items.length;
  items[cur].classList.add('active');
  items[cur].style.display = '';
}

// ── buildImgGrid: grid ذكي للصور ──
function buildImgGrid(images, pid) {
  const n = Math.min(images.length, 6);
  const visImgs = images.slice(0, n);
  const more    = images.length > 6 ? images.length - 5 : 0;

  return `<div class="post-imgs-grid" data-count="${n}">
    ${visImgs.map((a, i) => {
      const src = a.src || a.data || '';
      const isLast = more > 0 && i === 4;
      if (isLast) return `<div class="post-img-more" onclick="openGallery('${pid}',${i})">
        <img src="${src}" alt="" loading="lazy">
        <div class="post-img-more-overlay">+${more}</div>
      </div>`;
      return `<img src="${src}" alt="" onclick="openGallery('${pid}',${i})" loading="lazy">`;
    }).join('')}
  </div>`;
}

// ── buildFileGrid: نفس منطق الصور لكن للملفات ──
function buildFileGrid(files, pid) {
  const icons = { pdf:'📄', html:'🌐', txt:'📝', doc:'📃', docx:'📃' };
  const n = Math.min(files.length, 6);
  const visFiles = files.slice(0, n);
  const more     = files.length > 6 ? files.length - 5 : 0;
  const gridCols = n <= 1 ? '1fr' : n <= 2 ? '1fr 1fr' : 'repeat(3,1fr)';

  return `<div class="post-files-grid" style="grid-template-columns:${gridCols}">
    ${visFiles.map((a, i) => {
      const ext  = (a.name || '').split('.').pop().toLowerCase();
      const icon = icons[ext] || '📎';
      const isLast = more > 0 && i === 4;
      const src  = a.src || a.data || '#';
      if (isLast) return `<div class="post-file-thumb" onclick="openFileGallery('${pid}',${i})">
        <span class="file-icon">${icon}</span>
        <span style="font-size:8.5pt;color:#888">+${more} أخرى</span>
      </div>`;
      return `<div class="post-file-thumb" onclick="openFileGallery('${pid}',${i})">
        <span class="file-icon">${icon}</span>
        <span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:90%">${a.name||'ملف'}</span>
      </div>`;

let _galleryItems = [];
let _galleryIdx   = 0;
let _galleryType  = 'image';

function openGallery(postId, idx) {
  const allPosts = getAllLocalPosts();
  const post     = allPosts.find(p => p.id === postId);
  if (!post) return;
  _galleryItems = (post.attachments||[]).filter(a=>a.type==='image');
  _galleryType  = 'image';
  _openGalleryAt(idx);
}

function openFileGallery(postId, idx) {
  const allPosts = getAllLocalPosts();
  const post     = allPosts.find(p => p.id === postId);
  if (!post) return;
  _galleryItems = (post.attachments||[]).filter(a=>!['image','video','audio','youtube'].includes(a.type));
  _galleryType  = 'file';
  _openGalleryAt(idx);
}

function getAllLocalPosts() {
  return [
    ...JSON.parse(localStorage.getItem('royal_posts')||'[]'),
    ...JSON.parse(localStorage.getItem('royal_docs') ||'[]')
  ];
}

function _openGalleryAt(idx) {
  if (!_galleryItems.length) return;
  _galleryIdx = Math.min(idx, _galleryItems.length - 1);
  _renderGallery();
  document.getElementById('galleryOverlay').classList.add('open');
}

function _renderGallery() {
  const item = _galleryItems[_galleryIdx];
  const src  = item ? (item.src || item.data || '') : '';
  const imgEl = document.getElementById('galleryImg');
  const fr    = document.getElementById('galleryFrame');

  if (_galleryType === 'image') {
    imgEl.src    = src;
    imgEl.style.display = 'block';
    if (fr) fr.style.display = 'none';
  } else {
    // ملفات — استخدم iframe للمعاينة
    if (!fr) {
      const iframe = document.createElement('iframe');
      iframe.id    = 'galleryFrame';
      iframe.style.cssText = 'width:90vw;height:80vh;border:none;border-radius:8px;background:#fff';
      imgEl.after(iframe);
    }
    document.getElementById('galleryFrame').src = src;
    document.getElementById('galleryFrame').style.display = 'block';
    imgEl.style.display = 'none';
  }
  document.getElementById('galleryRight').style.display = _galleryItems.length > 1 ? '' : 'none';
  document.getElementById('galleryLeft').style.display  = _galleryItems.length > 1 ? '' : 'none';
}

function galleryNav(dir) {
  _galleryIdx = (_galleryIdx + dir + _galleryItems.length) % _galleryItems.length;
  _renderGallery();
}

function closeGallery() {
  document.getElementById('galleryOverlay').classList.remove('open');
}

// الكشف عن رابط YouTube وتحويله
function extractYoutubeId(url) {
  const m = url.match(/(?:v=|youtu\.be\/)([a-zA-Z0-9_-]{11})/);
  return m ? m[1] : null;
}

// رفع الملفات الكبيرة (> 10MB الافتراضي) إلى GAS للحفظ في Drive
async function uploadLargeFile(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = async ev => {
      try {
        const res = await fetch(AUTH_CONFIG.SCRIPT_URL, {
          method: 'POST',
          body: JSON.stringify({
            action:   'upload_file',
            userId:   currentUser.id,
            fileName: file.name,
            mimeType: file.type,
            data:     ev.target.result  // base64
          })
        });
        const data = await res.json();
        if (data.success) resolve(data.fileUrl);
        else reject(new Error(data.message));
      } catch(e) { reject(e); }
    };
    reader.readAsDataURL(file);
  });
}

// تحديث handlePeFile ليدعم الملفات الكبيرة + YouTube
async function handlePeFileEnhanced(e) {
  const file     = e.target.files[0];
  if (!file) return;
  const fileType = e.target.dataset.filetype || 'pdf';
  const limit    = getFileSizeLimit();
  const TEN_MB   = 10 * 1024 * 1024;

  // تحقق الحد الأقصى
  if (file.size > limit) {
    showToast('⚠️ حجم الملف يتجاوز الحد المسموح به لحسابك'); return;
  }

  // تحقق حدود الوحدات
  const counts = {};
  _peAttachments.forEach(a => counts[a.type] = (counts[a.type]||0)+1);
  if ((counts[fileType]||0) >= (PE_LIMITS[fileType]||6)) {
    showToast(`⚠️ الحد الأقصى ${PE_LIMITS[fileType]||6} من نوع ${fileType}`); return;
  }

  const btn = document.getElementById('pe'+fileType[0].toUpperCase()+fileType.slice(1)+'Btn');
  if (btn) { btn.disabled = true; btn.textContent = '⏳'; }

  if (file.size > TEN_MB) {
    // رفع للسحابة
    showToast('⏳ جاري رفع الملف إلى السحابة...');
    try {
      const url = await uploadLargeFile(file);
      _peAttachments.push({ type: fileType, src: url, name: file.name, size: file.size, isCloud: true });
      renderPeAttachments();
      renderPePreview();
      updatePeAttachBtns();
      showToast('✅ تم رفع الملف');
    } catch(_err) {
      showToast('⚠️ فشل رفع الملف: ' + _err.message);
    }
  } else {
    // قراءة محلية
    const reader = new FileReader();
    reader.onload = ev => {
      _peAttachments.push({ type: fileType, data: ev.target.result, name: file.name, size: file.size });
      renderPeAttachments();
      renderPePreview();
      updatePeAttachBtns();
    };
    reader.readAsDataURL(file);
  }
  if (btn) { btn.disabled = false; btn.textContent = ({image:'🖼️ صورة',audio:'🎵 صوت',video:'🎥 فيديو',pdf:'📄 ملف'})[fileType]||'📎'; }
  e.target.value = '';
}

// معاينة الملفات أثناء الكتابة
function renderPePreview() {
  let wrap = document.getElementById('pePreviewWrap');
  if (!wrap) {
    wrap = document.createElement('div');
    wrap.id = 'pePreviewWrap';
    wrap.className = 'pe-preview-wrap';
    document.getElementById('peAttachments').after(wrap);
  }
  wrap.innerHTML = _peAttachments.map((a, i) => {
    const src = a.src || a.data || '';
    if (a.type === 'image')
      return `<div class="pe-preview-item"><img src="${src}" alt="">
        <button class="pe-prev-remove" onclick="removePeAtt(${i})">✕</button></div>`;
    if (a.type === 'video')
      return `<div class="pe-preview-item"><video src="${src}" style="width:100%;height:100%;object-fit:cover"></video>
        <button class="pe-prev-remove" onclick="removePeAtt(${i})">✕</button></div>`;
    if (a.type === 'audio')
      return `<div class="pe-preview-item pe-preview-audio">🎵<br>${a.name.slice(0,14)}
        <button class="pe-prev-remove" onclick="removePeAtt(${i})">✕</button></div>`;
    if (a.type === 'youtube')
      return `<div class="pe-preview-item"><img src="https://img.youtube.com/vi/${a.ytId}/mqdefault.jpg"
        style="width:100%;height:100%;object-fit:cover"><button class="pe-prev-remove" onclick="removePeAtt(${i})">✕</button></div>`;
    return `<div class="pe-preview-item pe-preview-file">📎<br>${a.name.slice(0,14)}
      <button class="pe-prev-remove" onclick="removePeAtt(${i})">✕</button></div>`;
  }).join('');
}

// كشف YouTube عند اللصق في Textarea
function onPeInputEnhanced() {
  onPeInput();
  const text = document.getElementById('peTextarea').value;
  const lines = text.split('\n');
  const last  = lines[lines.length - 1].trim();
  const ytId  = extractYoutubeId(last);
  if (ytId && !_peAttachments.find(a => a.ytId === ytId)) {
    _peAttachments.push({ type:'youtube', ytId, name:'YouTube: '+ytId });

    lines[lines.length-1] = '';
    document.getElementById('peTextarea').value = lines.join('\n').trimEnd();
    renderPePreview();
    showToast('✅ تم إضافة فيديو YouTube');
  }
}

function toggleVisAccountSearch(mode) {

  wrap.style.display = ['specific','exclude'].includes(mode) ? 'block' : 'none';
}

function searchAccounts(val) {
  const res = document.getElementById('visSearchResults');
  if (!val || val.length < 2 || !navigator.onLine) { res.style.display='none'; return; }
  // بحث محلي في الأصدقاء المتابَعين كأساس
  const followed = JSON.parse(localStorage.getItem('royal_following')||'[]');
  const db = JSON.parse(localStorage.getItem('royal_users_cache')||'[]');
  const matches = db.filter(u =>
    u.username && u.username.includes(val) && !_hideAccounts.find(a => a.id===u.id)
  ).slice(0, 6);
  if (!matches.length) { res.style.display='none'; return; }
  res.style.display = 'block';
  res.innerHTML = matches.map(u => `
    <div class="account-result-item" onclick="addHideAccount('${u.id}','${u.username}','${u.profilePhoto||''}')">
      <span>${u.profilePhoto?`<img src="${u.profilePhoto}" style="width:28px;height:28px;border-radius:50%;object-fit:cover">`:'👤'}</span>
      <span>${u.username}</span>
    </div>`).join('');
}

function addHideAccount(id, name, photo) {
  if (!_hideAccounts.find(a => a.id===id)) _hideAccounts.push({id,name,photo});
  document.getElementById('visSearchInput').value = '';
  document.getElementById('visSearchResults').style.display = 'none';
  renderHideAccountTags();
}

function removeHideAccount(id) {
  _hideAccounts = _hideAccounts.filter(a => a.id !== id);
  renderHideAccountTags();
}

function renderHideAccountTags() {
  document.getElementById('visAccountTags').innerHTML = _hideAccounts.map(a => `
    <div class="account-tag">
      ${a.photo?`<img src="${a.photo}" style="width:22px;height:22px;border-radius:50%;object-fit:cover">`:'👤'}
      <span>${a.name}</span>
      <button onclick="removeHideAccount('${a.id}')">✕</button>
    </div>`).join('');
}

function confirmVisibility() {
  const post = getPostById(_hidePostId);
  if (!post) { closeHideModal(); return; }
  post.visibility = { mode: _hideVisMode, accounts: _hideAccounts };
  savePostLocally(post);
  closeHideModal();
  loadFeed(post.type || 'post');
  showToast('✅ تم حفظ إعدادات الرؤية');
}

function getPostById(id) {
  const all = [
    ...JSON.parse(localStorage.getItem('royal_posts')||'[]'),
    ...JSON.parse(localStorage.getItem('royal_docs') ||'[]')
  ];
  return all.find(p => p.id === id) || null;
}

function savePostLocally(post) {
  const key  = (post.type==='doc') ? 'royal_docs' : 'royal_posts';
  const feed = JSON.parse(localStorage.getItem(key)||'[]');
  const idx  = feed.findIndex(p => p.id === post.id);
  if (idx > -1) feed[idx] = post; else feed.unshift(post);
  localStorage.setItem(key, JSON.stringify(feed));
}

  if (tab==='shares')  { currentShareTab='mine'; renderMyShares(); }
  if (tab==='posts')   loadFeed('post');
  if (tab==='docs')    loadFeed('doc');
  if (tab==='deleted') renderDeletedTab();
}

// ─────────────────────────────────────────────
// VISITOR BOOKS TAB
// ─────────────────────────────────────────────
function switchVisitorTab(tab, btn) {
  document.querySelectorAll('.main-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  if (tab === 'books') renderVisitorBooksTab();
}

function renderVisitorBooksTab() {
  if (!_visitorShares.length) {
    document.getElementById('visitorBooksGrid').innerHTML =
      '<div class="empty-cat">📭 لم ينشر هذا المستخدم أي كتاب بعد</div>';
    return;
  }

  // تجميع التصنيفات من كتب المستخدم
  const catMap = {};
  _visitorShares.forEach(s => {
    const ids = s.bookData.categoryIds || (s.bookData.categoryId ? [s.bookData.categoryId] : []);
    ids.forEach(id => {
      if (!catMap[id]) catMap[id] = { id, name: id, color:'#6B8E23', shares:[] };
      catMap[id].shares.push(s);
    });
    if (!ids.length) {
      if (!catMap['__none__']) catMap['__none__'] = { id:'__none__', name:'عام', color:'#888', shares:[] };
      catMap['__none__'].shares.push(s);
    }
  });

  // تبويبات التصنيفات
  const catWrap = document.getElementById('visitorCatTabsWrap');
  if (catWrap) {
    const allBtn = `<button class="cat-tab cat-tab-all ${_visitorCatTab==='all'?'active':''}"
      onclick="selectVisitorCatTab('all',this)">الكل (${_visitorShares.length})</button>`;
    const catBtns = Object.values(catMap).map(cat =>
      `<button class="cat-tab ${_visitorCatTab===cat.id?'active':''}"
        style="background:${cat.color}"
        onclick="selectVisitorCatTab('${cat.id}',this)">${cat.name} (${cat.shares.length})</button>`
    ).join('');
    catWrap.innerHTML = allBtn + catBtns;
  }

  renderVisitorBooksGrid(_visitorCatTab, catMap);
}

function selectVisitorCatTab(catId, btn) {
  _visitorCatTab = catId;
  document.querySelectorAll('.cat-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  // إعادة بناء catMap
  const catMap = {};
  _visitorShares.forEach(s => {
    const ids = s.bookData.categoryIds || (s.bookData.categoryId ? [s.bookData.categoryId] : []);
    ids.forEach(id => {
      if (!catMap[id]) catMap[id] = { id, shares:[] };
      catMap[id].shares.push(s);
    });
    if (!ids.length) {
      if (!catMap['__none__']) catMap['__none__'] = { id:'__none__', shares:[] };
      catMap['__none__'].shares.push(s);
    }
  });
  renderVisitorBooksGrid(catId, catMap);
}

function renderVisitorBooksGrid(catId, catMap) {
  const grid = document.getElementById('visitorBooksGrid');
  const list = catId === 'all' ? _visitorShares
    : (catMap[catId] ? catMap[catId].shares : []);
  if (!list.length) {
    grid.innerHTML = '<div class="empty-cat">📭 لا توجد كتب في هذا التصنيف</div>'; return;
  }
  grid.innerHTML = list.map(s => buildVisitorBookCard(s)).join('');
}

function buildVisitorBookCard(s) {
  const bd  = s.bookData;
  const url = bd.cardImage || bd.cover || '';
  const cover = url ? `background-image:url('${url}')` : `background-color:#e9ecef`;
  return `<div class="visitor-book-card">
    <div class="visitor-book-cover" style="${cover}"
         onclick="openVisitorShare('${s.shareId}')">
      ${!url ? '<span style="position:absolute;top:40%;width:100%;text-align:center;color:#999;font-size:10pt">بدون غلاف</span>' : ''}
    </div>
    <div class="visitor-book-info">
      <div>
        <div class="visitor-book-title">${bd.title || 'بدون عنوان'}</div>
        <div class="visitor-book-meta">👁️ ${s.uses || 0} مشاهدة</div>
      </div>
      <button class="dots-btn" onclick="openVisitorBookMenu('${s.shareId}',event)"
        style="width:32px;height:32px;font-size:13pt;flex-shrink:0">⋮</button>
    </div>
  </div>`;
}

function openVisitorShare(shareId) {
  window.open('../s/index.html?id=' + shareId, '_blank');
}

function openVisitorBookMenu(shareId, e) {
  e.stopPropagation();
  const s = _visitorShares.find(x => x.shareId === shareId);
  if (!s) return;
  const items = [
    { icon:'🔗', label:'فتح الكتاب',   fn:`openVisitorShare('${shareId}')` },
    { icon:'📋', label:'نسخ الرابط',   fn:`copyVisitorShareLink('${shareId}')` },
    { icon:'💬', label:'التعليقات',     fn:`openVisitorShare('${shareId}')` },
  ];
  if (s.settings && s.settings.allowDownload) {
    items.push({ icon:'⬇️', label:'تحميل الكتاب', fn:`downloadVisitorBook('${shareId}')` });
  }
  showMiniMenu(items, e);
}

function copyVisitorShareLink(shareId) {
  const url = location.origin + location.pathname.replace(/profile\.html.*/, '') + 's/index.html?id=' + shareId;
  navigator.clipboard.writeText(url).then(() => showToast('✅ تم نسخ الرابط')).catch(() => {});
}

function downloadVisitorBook(shareId) {
  window.open('../s/index.html?id=' + shareId + '&download=1', '_blank');
}

function showToast(msg, dur = 2500) {
  let t = document.getElementById('_toast');
  if (!t) {
    t = document.createElement('div');
    t.id = '_toast';
    t.style.cssText = 'position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#2c3e50;color:#fff;padding:10px 22px;border-radius:20px;font-size:11pt;z-index:9999;transition:.3s;opacity:0;pointer-events:none';
    document.body.appendChild(t);
  }
  t.textContent = msg;
  t.style.opacity = '1';
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.style.opacity = '0', dur);
}

// ─────────────────────────────────────────────
// FOLLOW / UNFOLLOW
// ─────────────────────────────────────────────
async function toggleFollow() {
  if (!currentUser || currentUser.role !== 'member') {
    window.location.href = '../login.html'; return;
  }
  const btn = document.getElementById('followBtn');
  if (_isFollowing) {
    // تأكيد إلغاء المتابعة
    showConfirm(
      `هل تريد إلغاء متابعة <strong>${_visitorProfile.username}</strong>؟<br>
       <small style="color:#888">ستتوقف إشعارات نشاطه.</small>`,
      '🔕',
      async () => {
        btn.disabled = true;
        try {
          await fetch(AUTH_CONFIG.SCRIPT_URL, { method:'POST', body: JSON.stringify({
            action: 'unfollow_user', followerId: currentUser.id, targetUserId: _targetUid
          })});
          _isFollowing = false;
          _followersCount = Math.max(0, _followersCount - 1);
          updateFollowBtn();
          // تحديث محلي
          let following = JSON.parse(localStorage.getItem('royal_following') || '[]');
          following = following.filter(id => id !== _targetUid);
          localStorage.setItem('royal_following', JSON.stringify(following));
        } catch(_e) { showToast('⚠️ تعذر إلغاء المتابعة'); }
        btn.disabled = false;
      }
    );
  } else {
    btn.disabled = true;
    try {
      const res = await fetch(AUTH_CONFIG.SCRIPT_URL, { method:'POST', body: JSON.stringify({
        action: 'follow_user', followerId: currentUser.id, targetUserId: _targetUid
      })});
      const data = await res.json();
      if (data.success) {
        _isFollowing = true;
        _followersCount = data.followersCount || _followersCount + 1;
        updateFollowBtn();
        // تحديث محلي
        let following = JSON.parse(localStorage.getItem('royal_following') || '[]');
        if (!following.includes(_targetUid)) following.push(_targetUid);
        localStorage.setItem('royal_following', JSON.stringify(following));
      }
    } catch(_e) { showToast('⚠️ تعذر المتابعة'); }
    btn.disabled = false;
  }
}

function updateFollowBtn() {
  const btn = document.getElementById('followBtn');
  if (!btn) return;
  if (_isFollowing) {
    btn.textContent = '✓ تتابعه';
    btn.classList.add('following');
  } else {
    btn.textContent = '➕ متابعة';
    btn.classList.remove('following');
  }
  // تحديث عداد المتابعين
  const fc = document.getElementById('followersCountEl');
  if (fc) fc.textContent = _followersCount;
}

// ─────────────────────────────────────────────
// PROFILE DOTS MENU
// ─────────────────────────────────────────────
function openProfileDotsMenu(e) {
  e.stopPropagation();
  const overlay = document.createElement('div');
  overlay.style.cssText = 'position:fixed;inset:0;z-index:799';
  overlay.onclick = () => { overlay.remove(); menu.remove(); };
  document.body.appendChild(overlay);

  const menu = document.createElement('div');
  menu.className = 'profile-dots-menu';
  const items = _isOwner
    ? [{ icon:'🔗', label:'نسخ رابط حسابي', fn: copyMyProfileLink }]
    : [
        { icon:'🔗', label:'نسخ رابط الحساب',   fn: copyVisitorProfileLink },
        { icon:'🚩', label:'إبلاغ عن المستخدم', fn: reportUser, danger: true },
      ];
  menu.innerHTML = items.map(it =>
    `<div class="profile-dots-item ${it.danger?'danger':''}">${it.icon} ${it.label}</div>`
  ).join('');
  items.forEach((it, i) => {
    menu.children[i].onclick = () => { overlay.remove(); menu.remove(); it.fn(); };
  });

  const r = e.target.getBoundingClientRect();
  menu.style.cssText = `top:${r.bottom+6}px;left:${Math.max(8, r.right-210)}px;position:fixed;z-index:800`;
  document.body.appendChild(menu);
}

function copyMyProfileLink() {
  const url = location.origin + location.pathname.split('/').slice(0,-1).join('/') +
              '/profile.html?uid=' + (currentUser && currentUser.id);
  navigator.clipboard.writeText(url).then(() => showToast('✅ تم نسخ رابط حسابك'));
}

function copyVisitorProfileLink() {
  const url = location.origin + location.pathname + '?uid=' + _targetUid;
  navigator.clipboard.writeText(url).then(() => showToast('✅ تم نسخ رابط الحساب'));
}

function reportUser() {
  showConfirm('هل تريد الإبلاغ عن هذا المستخدم؟', '🚩', () => {
    showToast('📝 تم إرسال البلاغ. شكرًا.');
  });
}
