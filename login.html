<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>صانع الكتب - الدخول والتسجيل</title>
    <style>
        @font-face { font-family: 'Amiri';      src: url('fonts/Amiri-Regular.ttf')   format('truetype'); }
        @font-face { font-family: 'Aref Ruqaa'; src: url('fonts/ArefRuqaa-Bold.ttf')  format('truetype'); }

        body {
            user-select:none;-webkit-user-select:none;font-family: 'Amiri', serif;
            background-color: #f4f6f8;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            color: #333;
        }
        .auth-container {
            background: #fff;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            width: 100%;
            max-width: 400px;
            border-top: 6px solid #b8860b;
            text-align: center;
        }
        .auth-container h1 {
            color: #6B8E23;
            font-family: 'Aref Ruqaa', serif;
            font-size: 28pt;
            margin-bottom: 5px;
        }
        .auth-container > p { color: #666; margin-bottom: 25px; font-size: 14pt; }

        .form-section { display: none; flex-direction: column; gap: 15px; }
        .form-section.active { display: flex; animation: fadeIn 0.4s ease; }

        @keyframes fadeIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }

        input {
            width: 100%; padding: 12px;
            font-family: 'Amiri', serif; font-size: 14pt;
            border: 1px solid #ddd; border-radius: 8px;
            outline: none; box-sizing: border-box;
        }
        input:focus { border-color: #b8860b; box-shadow: 0 0 5px rgba(184,134,11,0.3); }

        .btn {
            padding: 12px;
            font-family: 'Aref Ruqaa', serif; font-size: 16pt;
            border: none; border-radius: 8px;
            cursor: pointer; color: white; transition: 0.3s;
        }
        .btn-primary { background-color: #6B8E23; }
        .btn-primary:hover { background-color: #55711b; }
        .btn-primary:disabled { background-color: #ccc; cursor: not-allowed; }

        .switch-link {
            margin-top: 5px; color: #1976d2; cursor: pointer;
            font-size: 13pt; text-decoration: underline;
            background: none; border: none;
            font-family: 'Amiri', serif;
        }
        .status-msg { margin-top: 15px; font-size: 12pt; font-weight: bold; min-height: 1.4em; }

        /* ── Avatar Picker ── */
        .avatar-pick-wrap { display:flex; flex-direction:column; align-items:center; gap:10px; }
        .avatar-pick-circle {
            width:80px; height:80px; border-radius:50%;
            border:2px dashed #b8860b; background:#fafafa;
            display:flex; align-items:center; justify-content:center;
            font-size:30pt; cursor:pointer; overflow:hidden; transition:.2s;
        }
        .avatar-pick-circle:hover { background:#fff8e1; border-color:#6B8E23; }
        .avatar-pick-circle img { width:100%; height:100%; object-fit:cover; border-radius:50%; }
        .avatar-pick-hint { font-size:10pt; color:#999; }
        #regAvatarInput { display:none; }
        .accountname-preview { font-size:10pt; color:#888; text-align:right; margin-top:-8px; padding-right:4px; }
        .accountname-preview span { color:#b8860b; font-weight:bold; }
        .field-small-hint { font-size:9.5pt; color:#aaa; text-align:right; margin-top:-8px; }

        /* [FIX] مؤشر المزامنة */
        .sync-indicator {
            display: none;
            margin-top: 10px;
            font-size: 11pt;
            color: #6B8E23;
            animation: pulse 1.2s infinite;
        }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
    </style>
</head>
<body>

<div class="auth-container">
    <h1>صانع الكتب</h1>
    <p id="subTitle">مرحباً بك في مكتبتك السحابية</p>

    <!-- نموذج الدخول -->
    <div id="loginForm" class="form-section active">
        <input type="email"    id="loginEmail" placeholder="البريد الإلكتروني">
        <input type="password" id="loginPass"  placeholder="كلمة المرور">
        <button class="btn btn-primary" id="btnLogin" onclick="login()">تسجيل الدخول</button>
        <button class="switch-link" onclick="switchForm('registerForm', 'إنشاء حساب جديد')">
            ليس لديك حساب؟ سجل الآن مجاناً
        </button>
    </div>

    <!-- نموذج التسجيل -->
    <div id="registerForm" class="form-section">
        <!-- صورة الحساب -->
        <div class="avatar-pick-wrap">
            <div class="avatar-pick-circle" id="regAvatarCircle"
                 onclick="document.getElementById('regAvatarInput').click()" title="اختر صورة">
                👤
            </div>
            <span class="avatar-pick-hint">اضغط لإضافة صورة (اختياري)</span>
            <input type="file" id="regAvatarInput" accept="image/*" onchange="handleRegAvatar(event)">
        </div>
        <!-- اسم المستخدم -->
        <input type="text" id="regUser" placeholder="اسم المستخدم (مثال: أبو عبد الله)" maxlength="40">
        <!-- اسم الحساب -->
        <input type="text" id="regAccountName" placeholder="اسم الحساب بالإنجليزية (مثال: abu_ali)"
               maxlength="30" dir="ltr" style="text-align:left" oninput="previewAccountName()">
        <div class="accountname-preview">@ <span id="regAccountNamePreview">—</span></div>
        <div class="field-small-hint">أحرف إنجليزية وأرقام و _ فقط · فريد لكل حساب</div>
        <!-- البريد وكلمة المرور -->
        <input type="email"    id="regEmail" placeholder="البريد الإلكتروني الحقيقي">
        <input type="password" id="regPass"  placeholder="كلمة المرور">
        <button class="btn btn-primary" id="btnRegister" onclick="requestOTP()">إرسال رمز التحقق</button>
        <button class="switch-link" onclick="switchForm('loginForm', 'تسجيل الدخول')">
            لديك حساب بالفعل؟ سجل دخولك
        </button>
    </div>

    <!-- نموذج OTP -->
    <div id="otpForm" class="form-section">
        <p style="color:#b8860b;font-size:12pt">
            تم إرسال رمز مكون من 6 أرقام إلى بريدك.
            (قد تجده في الرسائل غير المرغوب فيها Spam).
        </p>
        <input type="text" id="otpCode" placeholder="أدخل الرمز هنا"
               style="text-align:center;letter-spacing:5px;font-weight:bold">
        <button class="btn btn-primary" id="btnVerify" onclick="verifyOTP()">تأكيد وإنشاء الحساب</button>
        <button class="switch-link" onclick="switchForm('registerForm', 'إنشاء حساب جديد')">
            تعديل الإيميل
        </button>
    </div>

    <div id="statusMsg" class="status-msg"></div>
    <div id="syncIndicator" class="sync-indicator">☁️ جاري مزامنة مكتبتك...</div>

    <button onclick="window.location.href='index.html'"
            style="margin-top:20px;background:transparent;border:none;color:#aaa;cursor:pointer;text-decoration:underline;font-family:'Amiri',serif;font-size:12pt">
        العودة للرئيسية كزائر
    </button>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzVIL8_9oYVEfAIvIlzcQjz9SV1SR2Fni0k2Euo__92mtERHfiPJHnoxQKSkvYM5lB6/exec";
    const INDEX_PAGE = './';
    let tempRegData    = {};
    let regPhotoBase64 = null;

    // ── صورة الحساب ──────────────────────────────────────────
    function handleRegAvatar(e) {
        const file = e.target.files[0];
        if (!file) return;
        if (file.size > 2 * 1024 * 1024) {
            showStatus("حجم الصورة يجب أن يكون أقل من 2 ميغابايت", "red"); return;
        }
        const reader = new FileReader();
        reader.onload = ev => {
            regPhotoBase64 = ev.target.result;
            const circle = document.getElementById('regAvatarCircle');
            circle.innerHTML = `<img src="${regPhotoBase64}" alt="">`;
        };
        reader.readAsDataURL(file);
        e.target.value = '';
    }

    // ── معاينة اسم الحساب ────────────────────────────────────
    function previewAccountName() {
        const val = document.getElementById('regAccountName').value.trim().toLowerCase();
        document.getElementById('regAccountNamePreview').textContent = val || '—';
    }

    // ── مساعدات الواجهة ─────────────────────────────────────
    function switchForm(formId, title) {
        document.querySelectorAll('.form-section').forEach(f => f.classList.remove('active'));
        document.getElementById(formId).classList.add('active');
        document.getElementById('subTitle').innerText = title;
        document.getElementById('statusMsg').innerText = '';
    }

    function showStatus(msg, color = '#333') {
        const el = document.getElementById('statusMsg');
        el.innerText   = msg;
        el.style.color = color;
    }

    function setSyncIndicator(visible) {
        document.getElementById('syncIndicator').style.display = visible ? 'block' : 'none';
    }

    // ── 1. طلب OTP ─────────────────────────────────────────
    async function requestOTP() {
        const username    = document.getElementById('regUser').value.trim();
        const accountName = document.getElementById('regAccountName').value.trim().toLowerCase();
        const email       = document.getElementById('regEmail').value.trim();
        const password    = document.getElementById('regPass').value;
        const btn         = document.getElementById('btnRegister');

        if (!username || !email || !password)
            return showStatus("يرجى تعبئة جميع الحقول المطلوبة", "red");
        if (!accountName)
            return showStatus("يرجى إدخال اسم الحساب (AccountName)", "red");
        if (!/^[a-zA-Z0-9_]+$/.test(accountName))
            return showStatus("اسم الحساب: أحرف إنجليزية وأرقام و _ فقط", "red");
        if (accountName.length < 3)
            return showStatus("اسم الحساب يجب أن يكون 3 أحرف على الأقل", "red");

        tempRegData = { email, username, accountName, password, photo: regPhotoBase64 };
        btn.innerText = "جاري الإرسال..."; btn.disabled = true;
        showStatus("نرسل الرمز إلى بريدك...", "blue");

        try {
            const res  = await fetch(SCRIPT_URL, {
                method: 'POST',
                body: JSON.stringify({ action: "send_otp", email, username, accountName })
            });
            const data = await res.json();
            if (data.success) {
                switchForm('otpForm', 'أدخل رمز التحقق');
                showStatus("تم إرسال الرمز بنجاح!", "green");
            } else {
                showStatus(data.message, "red");
            }
        } catch {
            showStatus("خطأ في الاتصال بالخادم", "red");
        }
        btn.innerText = "إرسال رمز التحقق"; btn.disabled = false;
    }

    // ── 2. التحقق من OTP وإنشاء الحساب ────────────────────
    async function verifyOTP() {
        const otp = document.getElementById('otpCode').value.trim();
        const btn = document.getElementById('btnVerify');

        if (!otp) return showStatus("يرجى إدخال الرمز", "red");

        btn.innerText = "جاري الإنشاء..."; btn.disabled = true;

        try {
            const res  = await fetch(SCRIPT_URL, {
                method: 'POST',
                body: JSON.stringify({
                    action:      "verify_and_register",
                    email:       tempRegData.email,
                    username:    tempRegData.username,
                    accountName: tempRegData.accountName,
                    password:    tempRegData.password,
                    photo:       tempRegData.photo || '',
                    otp
                })
            });
            const data = await res.json();

            if (data.success) {
                localStorage.setItem('royal_user', JSON.stringify(data.user));
                showStatus("تم إنشاء الحساب بنجاح! جاري التحويل...", "green");

                // [FIX] مزامنة أولية بعد التسجيل (ترفع أي بيانات زائر موجودة)
                await syncLibrary(data.user.id, data.user.username);
                setTimeout(() => window.location.href = INDEX_PAGE, 1200);
            } else {
                showStatus(data.message, "red");
            }
        } catch {
            showStatus("خطأ في الاتصال بالخادم", "red");
        }
        btn.innerText = "تأكيد وإنشاء الحساب"; btn.disabled = false;
    }

    // ── 3. تسجيل الدخول ────────────────────────────────────
    async function login() {
        const email    = document.getElementById('loginEmail').value.trim();
        const password = document.getElementById('loginPass').value;
        const btn      = document.getElementById('btnLogin');

        if (!email || !password)
            return showStatus("أدخل الإيميل وكلمة المرور", "red");

        btn.innerText = "جاري الدخول..."; btn.disabled = true;
        showStatus("جاري التحقق من البيانات...", "blue");

        try {
            const res  = await fetch(SCRIPT_URL, {
                method: 'POST',
                body: JSON.stringify({ action: "login", email, password })
            });
            const data = await res.json();

            if (data.success) {
                localStorage.setItem('royal_user', JSON.stringify(data.user));
                showStatus("تم الدخول!", "green");

                // [FIX] مزامنة ذكية: دمج المحلي والسحابة وأخذ الأحدث
                await syncLibrary(data.user.id, data.user.username);
                window.location.href = INDEX_PAGE;
            } else {
                showStatus(data.message, "red");
            }
        } catch {
            showStatus("خطأ في الاتصال", "red");
        }
        btn.innerText = "تسجيل الدخول"; btn.disabled = false;
    }

    // ── [FIX] دالة المزامنة الذكية ─────────────────────────
    // ترسل البيانات المحلية، والسيرفر يقارن updatedAt ويرجع الأحدث من الجهتين.
    async function syncLibrary(userId, username) {
        setSyncIndicator(true);
        showStatus("جاري مزامنة مكتبتك...", "#6B8E23");

        const localBooks      = JSON.parse(localStorage.getItem('royal_books_list')      || '[]');
        const localCategories = JSON.parse(localStorage.getItem('royal_categories_list') || '[]');

        try {
            const res  = await fetch(SCRIPT_URL, {
                method: 'POST',
                body: JSON.stringify({
                    action:          "sync_library",
                    userId,
                    userName:        username,
                    localBooks,
                    localCategories
                })
            });
            const data = await res.json();

            if (data.success) {
                // [FIX] حفظ النتيجة المدمجة — تشمل ما في السحابة فقط أيضاً
                if (Array.isArray(data.mergedBooks)) {
                    localStorage.setItem('royal_books_list', JSON.stringify(data.mergedBooks));
                }
                if (Array.isArray(data.mergedCategories)) {
                    localStorage.setItem('royal_categories_list', JSON.stringify(data.mergedCategories));
                }
                localStorage.removeItem('pending_sync_book');
                localStorage.removeItem('pending_sync_categories');
                console.log('✅ تمت مزامنة المكتبة بنجاح');
            }
        } catch (e) {
            console.warn('⚠️ فشلت المزامنة عند الدخول:', e);
            // لا نُظهر خطأً للمستخدم — سيُزامَن عند عودة الإنترنت
        } finally {
            setSyncIndicator(false);
        }
    }
</script>

</body>
</html>
